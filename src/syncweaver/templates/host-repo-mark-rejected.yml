name: host-repo-mark-rejected

# Template workflow for host repos.
# Manually marks a patch file as rejected by prepending rejection metadata.
#
# Usage: copy this file to your host repo's .github/workflows/ and trigger
# it from the Actions UI.

on:
  workflow_dispatch:
    inputs:
      patch_file:
        description: Relative path to the patch file to mark as rejected
        required: true
        type: string
      pr_url:
        description: URL of the upstream PR that rejected this patch
        required: true
        type: string
      reason:
        description: Human-readable reason for rejection
        required: true
        type: string

permissions:
  contents: write

jobs:
  mark-rejected:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install syncweaver
        run: pip install git+https://github.com/CCBR/syncweaver.git@main

      - uses: CCBR/syncweaver/actions/host-repo-mark-patch-rejected@main
        with:
          patch-file: ${{ github.event.inputs.patch_file }}
          pr-url: ${{ github.event.inputs.pr_url }}
          reason: ${{ github.event.inputs.reason }}

      - name: Commit annotated patch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: mark patch as rejected"
          file_pattern: ${{ github.event.inputs.patch_file }}
