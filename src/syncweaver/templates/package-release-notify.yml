name: package-release-notify

# Template workflow for package repos.
# On a published release, computes changed files and dispatches notifications
# to relevant downstream capsule repos.
#
# Usage: copy this file to your package repo's .github/workflows/ and
# fill in the required inputs below. Add a capsules.yml file listing
# downstream capsule repos.

on:
  release:
    types:
      - published

permissions:
  contents: read
  actions: write

jobs:
  notify-capsules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install syncweaver
        run: pip install git+https://github.com/CCBR/syncweaver.git@main

      - name: Compute changed files
        id: changed
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            FILES=$(git diff --name-only $(git rev-list --max-parents=0 HEAD) HEAD | tr '\n' ',')
          else
            FILES=$(syncweaver release changed-files --from-tag "$PREV" --to-ref HEAD)
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - uses: CCBR/syncweaver/actions/package-notify-relevant-capsules@main
        with:
          package-name: Package1 # TODO: replace with your package name
          capsules-file: capsules.yml
          changed-files: ${{ steps.changed.outputs.files }}
          github-token: ${{ secrets.CCBR_BOT_TOKEN }}
