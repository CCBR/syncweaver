name: host-repo-regenerate-dependencies
description: >
  Regenerate DEPENDENCIES.yml for a vendored package by scanning entrypoints
  and committing the result.

inputs:
  package-name:
    description: Name of the upstream package
    required: true
  entrypoints:
    description: Comma-separated list of entrypoint files to scan (e.g. run.R)
    required: true
  vendor-dir:
    description: Path to vendored package code in the host repository (e.g. code/Package1)
    required: true
  refs-file:
    description: Path to .syncweaver-lock.json
    required: false
    default: .syncweaver-lock.json
  output-file:
    description: Path to write the generated DEPENDENCIES.yml
    required: false
    default: DEPENDENCIES.yml

runs:
  using: composite
  steps:
    - name: Regenerate dependencies
      shell: bash
      run: |
        echo "::notice::host-repo-regenerate-dependencies is a stub — implement with syncweaver CLI"
        syncweaver deps scan \
          --entrypoints "${{ inputs.entrypoints }}" \
          --vendor-dir "${{ inputs.vendor-dir }}" \
          --package-name "${{ inputs.package-name }}" \
          --refs-file "${{ inputs.refs-file }}" \
          --out "${{ inputs.output-file }}"
