name: capsule-mark-patch-rejected
description: >
  Prepend rejection metadata to a patch file and commit the change.

inputs:
  patch-file:
    description: Relative path to the patch file to annotate
    required: true
  pr-url:
    description: URL of the upstream PR that rejected this patch
    required: true
  reason:
    description: Human-readable reason for rejection
    required: true

runs:
  using: composite
  steps:
    - name: Annotate rejected patch
      shell: bash
      run: |
        echo "::notice::capsule-mark-patch-rejected is a stub — implement with syncweaver CLI"
        syncweaver patches annotate-rejected \
          --patch "${{ inputs.patch-file }}" \
          --pr-url "${{ inputs.pr-url }}" \
          --reason "${{ inputs.reason }}"
