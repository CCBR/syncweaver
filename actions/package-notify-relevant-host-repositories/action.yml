name: package-notify-relevant-host-repositories
description: >
  Dispatch release notifications only to host repositories whose DEPENDENCIES.yml
  overlaps with the changed files in a package release.

inputs:
  package-name:
    description: Name of the package being released
    required: true
  host-repositories-file:
    description: Path to host-repositories.yml listing downstream host repos
    required: false
    default: host-repositories.yml
  changed-files:
    description: Comma-separated list of files changed in the release
    required: true
  github-token:
    description: GitHub token with permission to dispatch workflow events
    required: true

runs:
  using: composite
  steps:
    - name: Notify relevant host repositories
      shell: bash
      run: |
        echo "::notice::package-notify-relevant-host-repositories is a stub — implement with syncweaver CLI"
        syncweaver release notify-host-repositories \
          --host-repositories-file "${{ inputs.host-repositories-file }}" \
          --package-name "${{ inputs.package-name }}" \
          --changed-files "${{ inputs.changed-files }}"
      env:
        GH_TOKEN: ${{ inputs.github-token }}
