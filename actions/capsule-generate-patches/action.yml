name: capsule-generate-patches
description: >
  Generate or update patch files in a capsule repo by diffing vendored package
  code against the baseline SHA recorded in .syncweaver-lock.json.

inputs:
  package-name:
    description: Name of the upstream package (e.g. Package1)
    required: true
  package-repo:
    description: GitHub URL of the upstream package repo
    required: true
  package-ref-key:
    description: Key used for the package in .syncweaver-lock.json (defaults to package-name)
    required: false
    default: ""
  vendor-dir:
    description: Path to vendored package code in the capsule (e.g. code/Package1)
    required: true
  refs-file:
    description: Path to .syncweaver-lock.json
    required: false
    default: .syncweaver-lock.json
  patches-dir:
    description: Directory to write generated patch files
    required: false
    default: code/syncweaver/patches

runs:
  using: composite
  steps:
    - name: Generate patches
      shell: bash
      run: |
        echo "::notice::capsule-generate-patches is a stub — implement with syncweaver CLI"
        syncweaver patches generate \
          --package "${{ inputs.package-name }}" \
          --repo-url "${{ inputs.package-repo }}" \
          --vendor-dir "${{ inputs.vendor-dir }}" \
          --patches-dir "${{ inputs.patches-dir }}" \
          --refs-file "${{ inputs.refs-file }}"
