name: update-host-source-direct
description: Check out a host repository directly, update matching tracked sources, and open a PR

inputs:
  source_repository:
    description: Source repository with updates (OWNER/REPO or URL).
    required: true
  host_repository:
    description: Host repository to update directly in OWNER/REPO format.
    required: true
  source_path:
    description: Optional tracked source path override; when omitted, all matching lockfile paths are updated.
    required: false
    default: ""
  lockfile:
    description: Host repository lockfile path.
    required: false
    default: .syncweaver-lock.json
  remote_subdir:
    description: Optional remote subdirectory to vendor in the host repo.
    required: false
    default: ""
  source_ref:
    description: Source ref to sync in the host repository.
    required: true
  app_id:
    description: GitHub App ID used to mint a token for host repository access.
    required: true
  app_private_key:
    description: GitHub App private key used to mint a token.
    required: true
  app_owner:
    description: GitHub owner for GitHub App token generation.
    required: false
    default: ""
  syncweaver-version:
    description: syncweaver version/ref to install (e.g. version tag, branch name, or commit SHA). Will use docker image if available.
    required: false
    default: main
  functracer-version:
    description: functracer version for docker image when dependency gating is used (e.g., v0.1.0).
    required: false
    default: v0.1.0
  functracer-entry-scripts:
    description: Optional comma/newline-separated host entry scripts used for functracer release impact checks.
    required: false
    default: ""
  functracer-source-paths:
    description: Optional comma/newline-separated tracked source paths that should be dependency-gated with functracer.
    required: false
    default: ""

outputs:
  source_paths:
    description: JSON array of source paths updated in the host repository.
    value: ${{ steps.filter_source_paths.outputs.source_paths }}
  source_count:
    description: Number of source paths updated in the host repository.
    value: ${{ steps.filter_source_paths.outputs.source_count }}
  skipped_source_paths:
    description: JSON array of source paths skipped by functracer dependency checks.
    value: ${{ steps.filter_source_paths.outputs.skipped_source_paths }}
  skipped_source_count:
    description: Number of source paths skipped by functracer dependency checks.
    value: ${{ steps.filter_source_paths.outputs.skipped_source_count }}
  pull_request_url:
    description: Pull request URL, when a PR is created.
    value: ${{ steps.create_pr.outputs.pull-request-url }}

runs:
  using: composite
  steps:
    - name: Validate required inputs
      shell: bash
      run: |
        set -euo pipefail

        if [[ -z "${{ inputs.host_repository }}" ]]; then
          echo "Error: host_repository is required." >&2
          exit 1
        fi
        if [[ -z "${{ inputs.source_repository }}" ]]; then
          echo "Error: source_repository is required." >&2
          exit 1
        fi
        if [[ -z "${{ inputs.source_ref }}" ]]; then
          echo "Error: source_ref is required." >&2
          exit 1
        fi

    - name: Resolve GitHub App token owner
      id: resolve_app_owner
      shell: bash
      env:
        HOST_REPOSITORY_INPUT: ${{ inputs.host_repository }}
        APP_OWNER_INPUT: ${{ inputs.app_owner }}
      run: |
        set -euo pipefail

        host_repository="${HOST_REPOSITORY_INPUT//[[:space:]]/}"
        app_owner_input="${APP_OWNER_INPUT//[[:space:]]/}"

        if [[ -n "${app_owner_input}" ]]; then
          app_owner="${app_owner_input}"
        else
          if [[ -z "${host_repository}" || "${host_repository}" != */* ]]; then
            echo "Error: host_repository must be in OWNER/REPO format when app_owner is not provided." >&2
            exit 1
          fi
          app_owner="${host_repository%%/*}"
        fi

        if [[ -z "${app_owner}" ]]; then
          echo "Error: unable to resolve app owner." >&2
          exit 1
        fi

        echo "app_owner=${app_owner}" >> "$GITHUB_OUTPUT"

    - name: Generate CCBR-bot token
      id: ccbr_bot
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}
        owner: ${{ steps.resolve_app_owner.outputs.app_owner }}

    - name: git config
      shell: bash
      run: |
        git config --global user.name "CCBR-bot"
        git config --global user.email "258092125+ccbr-bot@users.noreply.github.com"

    - name: Checkout host repository
      uses: actions/checkout@v7
      with:
        repository: ${{ inputs.host_repository }}
        token: ${{ steps.ccbr_bot.outputs.token }}
        fetch-depth: 0
        path: host-repo

    - name: Setup syncweaver
      id: setup_syncweaver
      uses: CCBR/syncweaver/actions/setup-syncweaver@main
      with:
        syncweaver-version: ${{ inputs.syncweaver-version }}

    - name: Resolve source paths from host lockfile
      id: resolve_source_paths
      shell: bash
      env:
        SOURCE_PATH_INPUT: ${{ inputs.source_path }}
        SOURCE_REPOSITORY_INPUT: ${{ inputs.source_repository }}
        LOCKFILE_INPUT: ${{ inputs.lockfile }}
      run: |
        set -euo pipefail
        syncweaver-python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os
        import pathlib

        from syncweaver.host_source_update import resolve_source_paths_for_host_update

        source_path_input = os.environ.get("SOURCE_PATH_INPUT", "").strip()
        source_repository_input = os.environ.get("SOURCE_REPOSITORY_INPUT", "").strip()
        lockfile_input = os.environ.get("LOCKFILE_INPUT", ".syncweaver-lock.json").strip()
        lockfile_path = pathlib.Path("host-repo") / pathlib.Path(lockfile_input)

        skipped_reason = ""
        try:
            resolved_source_paths = resolve_source_paths_for_host_update(
                lockfile_path=lockfile_path,
                source_path_input=source_path_input,
                source_repository_input=source_repository_input,
            )
        except ValueError as exc:
            message = str(exc)
            if "repo_url:" in message:
                message = message.replace("repo_url:", "source_repository:")
            if (
                "source_path was not provided and no tracked sources matched "
                "source_repository:" in message
            ):
                resolved_source_paths = []
                skipped_reason = message
            else:
                raise SystemExit(f"Error: {message}") from exc

        print(f"source_paths={json.dumps(resolved_source_paths)}")
        print(f"source_count={len(resolved_source_paths)}")
        if skipped_reason:
            print(f"skipped_reason={skipped_reason}")
        PY

    - name: Filter resolved source paths with optional functracer dependency checks
      id: filter_source_paths
      shell: bash
      env:
        SOURCE_PATHS_JSON: ${{ steps.resolve_source_paths.outputs.source_paths }}
        SOURCE_COUNT_INPUT: ${{ steps.resolve_source_paths.outputs.source_count }}
        RESOLVE_SKIP_REASON: ${{ steps.resolve_source_paths.outputs.skipped_reason }}
        LOCKFILE_INPUT: ${{ inputs.lockfile }}
        SOURCE_REF_INPUT: ${{ inputs.source_ref }}
        FUNCTRACER_VERSION_INPUT: ${{ inputs.functracer-version }}
        FUNCTRACER_ENTRY_SCRIPTS_INPUT: ${{ inputs.functracer-entry-scripts }}
        FUNCTRACER_SOURCE_PATHS_INPUT: ${{ inputs.functracer-source-paths }}
      run: |
        set -euo pipefail

        if [[ "${SOURCE_COUNT_INPUT}" == "0" ]]; then
          if [[ -n "${RESOLVE_SKIP_REASON}" ]]; then
            echo "::notice::Skipping host update: ${RESOLVE_SKIP_REASON}"
          fi
          echo "source_paths=[]" >> "$GITHUB_OUTPUT"
          echo "source_count=0" >> "$GITHUB_OUTPUT"
          echo "skipped_source_paths=[]" >> "$GITHUB_OUTPUT"
          echo "skipped_source_count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        syncweaver deps select-update-paths \
          --source-paths-json "${SOURCE_PATHS_JSON}" \
          --lockfile "${LOCKFILE_INPUT}" \
          --source-ref "${SOURCE_REF_INPUT}" \
          --host-repo "host-repo" \
          --functracer-version "${FUNCTRACER_VERSION_INPUT}" \
          --functracer-entry-scripts "${FUNCTRACER_ENTRY_SCRIPTS_INPUT}" \
          --functracer-source-paths "${FUNCTRACER_SOURCE_PATHS_INPUT}" \
          --functracer-backend "docker" \
          --github-output "${GITHUB_OUTPUT}"

    - name: Run syncweaver update for each resolved source path
      if: ${{ steps.filter_source_paths.outputs.source_count != '0' }}
      shell: bash
      env:
        SOURCE_PATHS_JSON: ${{ steps.filter_source_paths.outputs.source_paths }}
        LOCKFILE_INPUT: ${{ inputs.lockfile }}
        SOURCE_REF_INPUT: ${{ inputs.source_ref }}
        REMOTE_SUBDIR_INPUT: ${{ inputs.remote_subdir }}
      run: |
        set -euo pipefail
        syncweaver-python - <<'PY'
        import json
        import os
        import pathlib

        from syncweaver.host_source_update import run_syncweaver_updates

        source_paths = json.loads(os.environ["SOURCE_PATHS_JSON"])
        lockfile_input = os.environ.get("LOCKFILE_INPUT", ".syncweaver-lock.json")
        source_ref = os.environ.get("SOURCE_REF_INPUT", "").strip()
        remote_subdir = os.environ.get("REMOTE_SUBDIR_INPUT", "").strip()
        host_repo_path = pathlib.Path("host-repo")

        run_syncweaver_updates(
            source_paths=source_paths,
            lockfile_input=lockfile_input,
            source_ref=source_ref,
            remote_subdir=remote_subdir,
            host_repo_path=host_repo_path,
        )
        PY

    - name: Create source list for PR body
      id: source_list
      shell: bash
      env:
        SOURCE_PATHS_JSON: ${{ steps.filter_source_paths.outputs.source_paths }}
      run: |
        set -euo pipefail
        syncweaver-python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os

        from syncweaver.host_source_update import format_source_paths_markdown

        source_paths = json.loads(os.environ["SOURCE_PATHS_JSON"])
        markdown = format_source_paths_markdown(source_paths)

        print("source_paths_md<<EOF")
        print(markdown)
        print("EOF")
        PY

    - name: Build PR branch name
      id: pr_branch
      shell: bash
      env:
        SOURCE_REPOSITORY_INPUT: ${{ inputs.source_repository }}
      run: |
        set -euo pipefail
        syncweaver-python - <<'PY' >> "$GITHUB_OUTPUT"
        import os

        from syncweaver.host_source_update import build_source_update_branch_name

        source_repository = os.environ.get("SOURCE_REPOSITORY_INPUT", "").strip()
        branch_name = build_source_update_branch_name(source_repository)
        print(f"branch_name={branch_name}")
        PY

    - name: Create pull request in host repository
      id: create_pr
      if: ${{ steps.filter_source_paths.outputs.source_count != '0' }}
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ steps.ccbr_bot.outputs.token }}
        path: host-repo
        branch: ${{ steps.pr_branch.outputs.branch_name }}
        delete-branch: true
        committer: "CCBR-bot <258092125+ccbr-bot@users.noreply.github.com>"
        commit-message: "chore(syncweaver): update tracked sources from ${{ inputs.source_repository }}@${{ inputs.source_ref }}"
        title: "chore(syncweaver): update from ${{ inputs.source_repository }}@${{ inputs.source_ref }}"
        body: |
          Automated source update orchestrated by [`${{ github.repository }}`](https://github.com/${{ github.repository }}).

          ### Inputs used

          - source_repository: [`${{ inputs.source_repository }}`](https://github.com/${{ inputs.source_repository }})
          - lockfile: `${{ inputs.lockfile }}`
          - ref: `${{ inputs.source_ref }}`

          ### Updated source paths

          ${{ steps.source_list.outputs.source_paths_md }}
