name: update-host-source-direct
description: Check out a host repository directly, update matching tracked sources, and open a PR

inputs:
  source_repository:
    description: Source repository with updates (OWNER/REPO or URL).
    required: true
  host_repository:
    description: Host repository to update directly in OWNER/REPO format.
    required: true
  source_path:
    description: Optional tracked source path override; when omitted, all matching lockfile paths are updated.
    required: false
    default: ""
  lockfile:
    description: Host repository lockfile path.
    required: false
    default: .syncweaver-lock.json
  remote_subdir:
    description: Optional remote subdirectory to vendor in the host repo.
    required: false
    default: ""
  source_ref:
    description: Source ref to sync in the host repository.
    required: true
  app_id:
    description: GitHub App ID used to mint a token for host repository access.
    required: true
  app_private_key:
    description: GitHub App private key used to mint a token.
    required: true
  app_owner:
    description: GitHub owner for GitHub App token generation.
    required: false
    default: ""
  syncweaver-version:
    description: syncweaver version/ref to install (e.g. main, v0.1.0, or commit SHA).
    required: false
    default: main

outputs:
  source_paths:
    description: JSON array of source paths updated in the host repository.
    value: ${{ steps.resolve_source_paths.outputs.source_paths }}
  source_count:
    description: Number of source paths updated in the host repository.
    value: ${{ steps.resolve_source_paths.outputs.source_count }}
  pull_request_url:
    description: Pull request URL, when a PR is created.
    value: ${{ steps.create_pr.outputs.pull-request-url }}

runs:
  using: composite
  steps:
    - name: Validate required inputs
      shell: bash
      run: |
        set -euo pipefail

        if [[ -z "${{ inputs.host_repository }}" ]]; then
          echo "Error: host_repository is required." >&2
          exit 1
        fi
        if [[ -z "${{ inputs.source_repository }}" ]]; then
          echo "Error: source_repository is required." >&2
          exit 1
        fi
        if [[ -z "${{ inputs.source_ref }}" ]]; then
          echo "Error: source_ref is required." >&2
          exit 1
        fi

    - name: Resolve GitHub App token owner
      id: resolve_app_owner
      shell: python
      env:
        HOST_REPOSITORY_INPUT: ${{ inputs.host_repository }}
        APP_OWNER_INPUT: ${{ inputs.app_owner }}
      run: |
        import os
        import pathlib

        host_repository = os.environ.get("HOST_REPOSITORY_INPUT", "").strip()
        app_owner_input = os.environ.get("APP_OWNER_INPUT", "").strip()

        if app_owner_input:
          app_owner = app_owner_input
        else:
          if "/" not in host_repository:
            raise SystemExit(
              "Error: host_repository must be in OWNER/REPO format to derive app_owner"
            )
          app_owner = host_repository.split("/", 1)[0].strip()

        if not app_owner:
          raise SystemExit("Error: unable to resolve app_owner for GitHub App token")

        output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
        with output_path.open("a", encoding="utf-8") as fh:
          fh.write(f"app_owner={app_owner}\n")

    - name: Generate CCBR-bot token
      id: ccbr_bot
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}
        owner: ${{ steps.resolve_app_owner.outputs.app_owner }}

    - name: Checkout host repository
      uses: actions/checkout@v7
      with:
        repository: ${{ inputs.host_repository }}
        token: ${{ steps.ccbr_bot.outputs.token }}
        fetch-depth: 0
        path: host-repo

    - uses: actions/checkout@v7
      with:
        repository: CCBR/syncweaver
        ref: ${{ inputs.syncweaver-version }}
        sparse-checkout: pyproject.toml
        path: syncweaver-cache

    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: pip
        cache-dependency-path: syncweaver-cache/pyproject.toml

    - name: Install syncweaver
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install "git+https://github.com/CCBR/syncweaver.git@${{ inputs.syncweaver-version }}"

    - name: Resolve source paths from host lockfile
      id: resolve_source_paths
      shell: python
      env:
        SOURCE_PATH_INPUT: ${{ inputs.source_path }}
        SOURCE_REPOSITORY_INPUT: ${{ inputs.source_repository }}
        LOCKFILE_INPUT: ${{ inputs.lockfile }}
      run: |
        import json
        import os
        import pathlib

        def normalize_remote_url(url: str) -> str:
            stripped = url.strip()
            normalized = stripped
            if stripped.startswith("git@") and ":" in stripped:
                host_part, path_part = stripped.split(":", 1)
                host = host_part.split("@", 1)[1]
                path = path_part.removesuffix(".git")
                normalized = f"https://{host}/{path}"
            elif stripped.startswith("http://") or stripped.startswith("https://"):
                normalized = stripped.removesuffix(".git")
            elif "/" in stripped and "@" not in stripped and "://" not in stripped:
                parts = [part for part in stripped.split("/") if part]
                if len(parts) == 2:
                    normalized = f"https://github.com/{parts[0]}/{parts[1]}"
                elif len(parts) >= 3 and "." in parts[0]:
                    normalized = f"https://{'/'.join(parts)}"
                normalized = normalized.removesuffix(".git")
            return normalized

        def upgrade_legacy_lockfile_shape(lock_data: dict) -> dict:
            upgraded = lock_data
            has_sources = isinstance(upgraded.get("sources"), dict)
            has_legacy_repos = isinstance(upgraded.get("repos"), dict)
            if has_legacy_repos and not has_sources:
                sources: dict[str, dict] = {}
                legacy_repos = upgraded.get("repos", {})
                for repo_url, repo_entry in legacy_repos.items():
                    legacy_sources = repo_entry.get("sources", {})
                    for source_path, source_entry in legacy_sources.items():
                        upgraded_entry = dict(source_entry)
                        if "branch" in upgraded_entry and "ref" not in upgraded_entry:
                            upgraded_entry["ref"] = upgraded_entry.pop("branch")
                        upgraded_entry["repo_url"] = repo_url
                        existing_entry = sources.get(source_path)
                        if existing_entry and existing_entry != upgraded_entry:
                            raise ValueError(
                                "Legacy lockfile has conflicting tracked entries for "
                                f"source path: {source_path}"
                            )
                        sources[source_path] = upgraded_entry
                upgraded["sources"] = sources
                upgraded.pop("repos", None)
            return upgraded

        source_path_input = os.environ.get("SOURCE_PATH_INPUT", "").strip()
        source_repository_input = os.environ.get("SOURCE_REPOSITORY_INPUT", "").strip()
        lockfile_input = os.environ.get("LOCKFILE_INPUT", ".syncweaver-lock.json").strip()
        output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
        lockfile_path = pathlib.Path("host-repo") / pathlib.Path(lockfile_input)

        if source_path_input:
            resolved_source_paths = [source_path_input]
        else:
            if not lockfile_path.exists():
                raise SystemExit(
                    "Error: lockfile does not exist and source_path was not provided: "
                    f"{lockfile_path}"
                )

            lock_data = json.loads(lockfile_path.read_text())
            lock_data = upgrade_legacy_lockfile_shape(lock_data)
            sources = lock_data.get("sources", {})
            has_sources = isinstance(sources, dict) and bool(sources)
            if not has_sources:
                raise SystemExit(
                    "Error: no tracked sources found in lockfile and source_path was not provided"
                )

            normalized_source_repository = normalize_remote_url(source_repository_input)
            matching_source_paths: list[str] = []
            for path_key, source_entry in sources.items():
                entry_repo_url = str(source_entry.get("repo_url", "")).strip()
                if entry_repo_url:
                    normalized_entry_url = normalize_remote_url(entry_repo_url)
                    if normalized_entry_url == normalized_source_repository:
                        matching_source_paths.append(str(path_key))

            if not matching_source_paths:
                raise SystemExit(
                    "Error: source_path was not provided and no tracked sources matched "
                    f"source_repository: {source_repository_input}"
                )

            resolved_source_paths = sorted(matching_source_paths)

        with output_path.open("a", encoding="utf-8") as fh:
            fh.write(f"source_paths={json.dumps(resolved_source_paths)}\n")
            fh.write(f"source_count={len(resolved_source_paths)}\n")

    - name: Run syncweaver update for each resolved source path
      shell: python
      env:
        SOURCE_PATHS_JSON: ${{ steps.resolve_source_paths.outputs.source_paths }}
        LOCKFILE_INPUT: ${{ inputs.lockfile }}
        SOURCE_REF_INPUT: ${{ inputs.source_ref }}
        REMOTE_SUBDIR_INPUT: ${{ inputs.remote_subdir }}
      run: |
        import json
        import os
        import pathlib
        import subprocess

        source_paths = json.loads(os.environ["SOURCE_PATHS_JSON"])
        lockfile_input = os.environ.get("LOCKFILE_INPUT", ".syncweaver-lock.json")
        source_ref = os.environ.get("SOURCE_REF_INPUT", "").strip()
        remote_subdir = os.environ.get("REMOTE_SUBDIR_INPUT", "").strip()
        host_repo_path = pathlib.Path("host-repo")

        for source_path in source_paths:
            command = [
                "syncweaver",
                "update",
                "--path",
                str(source_path),
                "--lockfile",
                str(lockfile_input),
            ]
            if source_ref:
                command.extend(["--ref", source_ref])
            if remote_subdir:
                command.extend(["--remote-subdir", remote_subdir])
            subprocess.run(command, cwd=host_repo_path, check=True)

    - name: Create source list for PR body
      id: source_list
      shell: python
      env:
        SOURCE_PATHS_JSON: ${{ steps.resolve_source_paths.outputs.source_paths }}
      run: |
        import json
        import os
        import pathlib

        source_paths = json.loads(os.environ["SOURCE_PATHS_JSON"])
        output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])

        lines = [f"- {source_path}" for source_path in source_paths]
        markdown = "\n".join(lines)

        with output_path.open("a", encoding="utf-8") as fh:
            fh.write("source_paths_md<<EOF\n")
            fh.write(f"{markdown}\n")
            fh.write("EOF\n")

    - name: Build PR branch name
      id: pr_branch
      shell: python
      env:
        SOURCE_REPOSITORY_INPUT: ${{ inputs.source_repository }}
      run: |
        import os
        import pathlib
        import re

        source_repository = os.environ.get("SOURCE_REPOSITORY_INPUT", "").strip()
        sanitized = re.sub(r"[^A-Za-z0-9._-]+", "-", source_repository).strip("-.")
        if not sanitized:
            sanitized = "source"

        output_path = pathlib.Path(os.environ["GITHUB_OUTPUT"])
        with output_path.open("a", encoding="utf-8") as fh:
            fh.write(f"branch_name=syncweaver/update-source/{sanitized}\n")

    - name: Create pull request in host repository
      id: create_pr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ steps.ccbr_bot.outputs.token }}
        path: host-repo
        branch: ${{ steps.pr_branch.outputs.branch_name }}
        delete-branch: true
        commit-message: "chore(syncweaver): update ${{ inputs.source_repository }} tracked sources"
        title: "chore(syncweaver): update tracked sources from ${{ inputs.source_repository }}@${{ inputs.source_ref }}"
        body: |
          Automated source update executed from CCBR/syncweaver.

          Inputs used:
          - source_repository: ${{ inputs.source_repository }}
          - lockfile: ${{ inputs.lockfile }}
          - ref: ${{ inputs.source_ref }}
          - remote_subdir: ${{ inputs.remote_subdir }}

          Updated source paths:
          ${{ steps.source_list.outputs.source_paths_md }}
